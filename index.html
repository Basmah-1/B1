<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B Accessories</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
}

/* Loader */
.loader {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #ffd6e0;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
    color: #ff4f81;
    font-size: 30px;
}

/* Background */
.main {
    height: 100vh;
    display: none;
    justify-content: center;
    align-items: center;
    background: linear-gradient(-45deg, #ffd6e0, #ffc0cb, #ff9eb5, #ffe4ec);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
    position: relative;
}

@keyframes gradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* Sparkles */
.sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    opacity: 0.7;
    animation: sparkleMove 6s linear infinite;
}

@keyframes sparkleMove {
    from {transform: translateY(0);}
    to {transform: translateY(-800px);}
}

/* Card */
.container {
    width: 340px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    border-radius: 25px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.15);
}

/* SVG LOGO */
.logo {
    width: 120px;
    margin-bottom: 10px;
    animation: float 3s ease-in-out infinite;
}

h1 {
    color: #ff4f81;
    margin: 5px 0;
}

.bio {
    font-size: 14px;
    color: #666;
}

/* Links */
.link {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px;
    margin: 10px 0;
    border-radius: 20px;
    text-decoration: none;
    color: #fff;
    background: linear-gradient(45deg, #ff6f91, #ff9a9e);
    transition: 0.3s;
}

.link:hover {
    transform: scale(1.05);
}

.cta {
    background: linear-gradient(45deg, #ff4f81, #ff85a2);
}

/* Animation */
@keyframes float {
    0% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
    100% {transform: translateY(0);}
}

</style>
</head>

<body>

<div class="loader" id="loader">Loading....</div>

<div class="main" id="main">

<!-- Sparkles -->
<script>
for(let i=0;i<20;i++){
    let s=document.createElement("div");
    s.className="sparkle";
    s.style.left=Math.random()*100+"%";
    s.style.animationDuration=(3+Math.random()*5)+"s";
    document.body.appendChild(s);
}
</script>

<div class="container">

<div class="logo-box">
    <img src="logo.png" class="logo">
</div>
<h1>B Accessories</h1>
<div class="bio">Cute Accessories 💖</div>

<a class="link" href="https://www.instagram.com/b.accessoris_?igsh=MTJoZzEyYjVtcWN2Mg==" target="_blank">
<span><i class="fab fa-instagram"></i> Instagram</span>
<i class="fas fa-arrow-right"></i>
</a>

<a class="link" href="https://www.tiktok.com/@b.accessories2?_r=1&_t=ZS-95ygqTGOLwK" target="_blank">
<span><i class="fab fa-tiktok"></i> TikTok</span>
<i class="fas fa-arrow-right"></i>
</a>

<a class="link" href="https://www.facebook.com/share/g/18n8rQMX36/?mibextid=wwXIfr" target="_blank">
<span><i class="fab fa-facebook"></i> Facebook</span>
<i class="fas fa-arrow-right"></i>
</a>

<a class="link cta" href="https://chat.whatsapp.com/LUDRyRN6DVA5vSLurLzKF6?mode=gi_tXX" target="_blank">
<span><i class="fab fa-whatsapp"></i> Order Now</span>
<i class="fas fa-heart"></i>
</a>

</div>
</div>

<!-- Loader Script -->
<script>
setTimeout(()=>{
    document.getElementById("loader").style.display="none";
    document.getElementById("main").style.display="flex";
},1000);
</script>
</body>
</html>
